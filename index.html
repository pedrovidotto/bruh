<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>WORKOUT.SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d2a27"> 
</head>
<body data-theme="dark">

<header id="main-header">
  <div class="container">
    <div class="header-top">
      <div class="logo">
        <img src="logo.svg" alt="WORKOUT.SYS" class="logo-svg">
      </div>
      <button id="theme-toggle-btn" class="theme-toggle" aria-label="Toggle Theme">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" class="svg-bg-circle"/>
          <path d="M10 1a9 9 0 0 1 0 18V1z" class="svg-fg-circle"/>
        </svg>
      </button>
    </div>
    <nav id="day-selector"></nav>
  </div>
</header>

<main class="container">
  <div id="workout-header">
    <h2 id="workout-title">INITIALIZING...</h2>
    <p id="workout-duration" class="data-readout"></p>
  </div>

  <ul id="exercise-list" class="list-reset"></ul>

  <div id="completed-section" class="hidden">
    <h3 class="section-label">// COMPLETED</h3>
    <ul id="completed-list" class="list-reset"></ul>
  </div>

  <footer>
    <button id="reset-button" class="btn-secondary">PURGE WEEKLY PROGRESS</button>
  </footer>
</main>

<div id="timer-display" class="hidden">00:00</div>

<div id="info-modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="info-modal-title" class="serif-title"></h2>
      <button id="info-modal-close-btn" class="close-btn">×</button>
    </div>
    <div class="divider"></div>
    <div id="info-modal-instructions" class="modal-body"></div>
  </div>
</div>

<div id="reset-modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <h2 class="serif-title">CONFIRM RESET</h2>
    <p class="modal-body">This will permanently delete all weekly progress logs.</p>
    <div class="modal-actions">
      <button id="confirm-reset-btn" class="btn-primary">CONFIRM</button>
      <button id="cancel-reset-btn" class="btn-secondary">CANCEL</button>
    </div>
  </div>
</div>

<div id="completion-overlay" class="hidden">
  <div class="completion-card">
    <h2 class="serif-title">// TASK COMPLETE</h2>
    <p id="completion-message"></p>
    <p class="hint">TAP TO DISMISS</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
